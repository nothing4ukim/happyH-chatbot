<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#215D4C">
<title>행복한H병원 사전문진</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#f4f2ec;color:#1a1a1a;min-height:100vh;padding:16px 14px 40px;line-height:1.6;-webkit-font-smoothing:antialiased}
#app{max-width:640px;margin:0 auto}

/* header */
.hdr{background:#fff;border:1px solid #dcdacf;border-radius:14px;padding:16px 18px;margin-bottom:12px;display:flex;align-items:center;gap:13px}
.hdr-ava{width:48px;height:48px;border-radius:50%;background:#e6efe9;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px;overflow:hidden;border:2.5px solid #215D4C;box-shadow:0 0 0 2px #e6efe9}
.hdr-ava img{width:100%;height:100%;object-fit:cover;object-position:top center}
.hdr-t{font-size:15.5px;font-weight:700}
.hdr-s{font-size:12px;color:#6b6a64;margin-top:2px}
.hdr-badge{margin-left:auto;padding:4px 12px;border-radius:99px;font-size:11.5px;font-weight:600;white-space:nowrap;border:1px solid #215D4C;color:#215D4C;background:#E9F1EC}
.hdr-badge.hide{display:none}

/* progress */
.prog-wrap{height:5px;background:#dcdacf;border-radius:99px;margin-bottom:5px;overflow:hidden}
.prog-fill{height:100%;background:#215D4C;border-radius:99px;transition:width .4s ease;width:0}
.prog-lbl{font-size:11.5px;color:#6b6a64;text-align:right;margin-bottom:12px}
.prog-lbl.hide,.prog-wrap.hide{display:none}

/* card */
.card{background:#fff;border:1px solid #dcdacf;border-radius:14px;padding:20px 20px 18px;margin-bottom:12px}
.q-ask{font-size:15.5px;font-weight:600;line-height:1.7;white-space:pre-wrap;margin-bottom:4px}
.q-note{font-size:12.5px;color:#8a887f;margin-top:6px}

/* intro */
.intro-greet{font-size:14.5px;line-height:1.85;white-space:pre-wrap;color:#3a3a37;margin-bottom:18px}
.sec-t{font-size:12px;font-weight:700;color:#215D4C;letter-spacing:.4px;margin:2px 0 12px}

/* choices */
.opts{display:flex;flex-direction:column;gap:9px;margin-top:16px}
.opt{width:100%;text-align:left;background:#fff;border:1.5px solid #cbc9be;border-radius:10px;padding:13px 16px;font-size:14.5px;cursor:pointer;font-family:inherit;transition:all .12s;color:#1a1a1a;line-height:1.45}
.opt:hover{background:#E9F1EC;border-color:#7FAE9C}
.opt:active{transform:scale(.995)}
.opt.sel{background:#E9F1EC;border-color:#215D4C;font-weight:600;color:#163F31}
.opt.sel::before{content:"✓ ";color:#215D4C;font-weight:700}

/* multi checkbox grid */
.multi{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:16px}
.multi.one{grid-template-columns:1fr}
.chk{display:flex;align-items:center;gap:9px;padding:12px 13px;border:1.5px solid #cbc9be;border-radius:10px;cursor:pointer;font-size:14px;background:#fff;transition:all .12s;user-select:none;line-height:1.35}
.chk:hover{background:#E9F1EC;border-color:#7FAE9C}
.chk.sel{background:#E9F1EC;border-color:#215D4C;color:#163F31;font-weight:600}
.chk .box{width:19px;height:19px;border-radius:5px;border:2px solid #b4b2a9;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;transition:all .12s}
.chk.sel .box{background:#215D4C;border-color:#215D4C}

/* text */
.txt-inp{width:100%;border:1.5px solid #cbc9be;border-radius:10px;padding:13px 15px;font-size:15px;resize:vertical;min-height:100px;line-height:1.6;font-family:inherit;background:#fdfdfc;margin-top:16px}
.txt-inp:focus{outline:none;border-color:#215D4C;background:#fff}
.short-inp{min-height:auto;height:52px;resize:none}

/* fields */
.fields{display:flex;flex-direction:column;gap:12px;margin-top:16px}
.field-row{display:flex;align-items:center;gap:12px}
.field-lbl{font-size:14px;color:#4a4a46;min-width:96px;flex-shrink:0}
.field-inp{flex:1;border:1.5px solid #cbc9be;border-radius:9px;padding:11px 13px;font-size:15px;font-family:inherit;background:#fdfdfc}
.field-inp:focus{outline:none;border-color:#215D4C;background:#fff}

/* vas / sliders */
.vas-block{margin-top:16px;display:flex;flex-direction:column;gap:18px}
.vas-item{background:#f7f5ef;border:1px solid #e3e1d7;border-radius:11px;padding:14px 16px}
.vas-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.vas-name{font-size:14px;color:#3a3a37;font-weight:500}
.vas-num{font-size:22px;font-weight:800;color:#215D4C;min-width:34px;text-align:right;line-height:1}
.vas-item input[type=range]{width:100%;accent-color:#215D4C;height:26px}
.vas-scale{display:flex;justify-content:space-between;font-size:11px;color:#8a887f;margin-top:3px}

/* scale 0-3 group */
.sg-item{padding:12px 0;border-bottom:1px solid #eceadf}
.sg-item:last-child{border-bottom:none}
.sg-name{font-size:14px;color:#3a3a37;margin-bottom:9px;line-height:1.45}
.sg-opts{display:flex;gap:6px}
.sg-opt{flex:1;text-align:center;border:1.5px solid #cbc9be;border-radius:8px;padding:8px 2px;font-size:12.5px;cursor:pointer;background:#fff;transition:all .12s;font-family:inherit;color:#4a4a46;line-height:1.25}
.sg-opt:hover{background:#E9F1EC}
.sg-opt.sel{background:#215D4C;border-color:#215D4C;color:#fff;font-weight:700}
.sg-opt b{display:block;font-size:15px}

/* actions */
.actions{display:flex;gap:10px;margin-top:20px}
.btn{border:none;border-radius:10px;padding:14px 18px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .12s}
.btn:active{transform:scale(.99)}
.btn-primary{background:#215D4C;color:#fff;flex:1}
.btn-primary:hover{background:#163F31}
.btn-primary:disabled{background:#c3c1b8;cursor:default}
.btn-ghost{background:#f0eee6;color:#5f5e58;border:1px solid #dcdacf}
.btn-ghost:hover{background:#e6e4da}
.btn-back{background:none;border:none;color:#8a887f;font-size:13px;cursor:pointer;padding:8px 4px;font-family:inherit;margin-top:2px}
.btn-back:hover{color:#215D4C;text-decoration:underline}

/* summary */
.sum-badge{display:inline-block;padding:5px 14px;border-radius:99px;font-size:12.5px;font-weight:700;color:#fff;margin-bottom:4px}
.sum-badge.pain{background:#d1584f}.sum-badge.auto{background:#4F8F76}.sum-badge.cancer{background:#2e8b78}
.sum-date{font-size:11.5px;color:#999;margin:6px 0 4px}
.sum-hi{font-size:15px;line-height:1.7;margin-bottom:6px}
.sum-sec{font-size:11px;font-weight:700;color:#215D4C;letter-spacing:.5px;margin:20px 0 8px;border-bottom:1.5px solid #ebe9df;padding-bottom:5px}
.sum-row{display:flex;gap:10px;margin-bottom:7px;font-size:13.5px;line-height:1.55}
.sum-lbl{color:#7a786f;min-width:112px;flex-shrink:0;font-weight:500}
.sum-val{color:#1a1a1a;flex:1;white-space:pre-wrap;word-break:break-word}
.sum-val.free{background:#f7f5ef;border-radius:8px;padding:10px 12px;border:1px solid #e3e1d7}

/* score bars */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-size:13px}
.bar-name{min-width:110px;color:#4a4a46;flex-shrink:0}
.bar-track{flex:1;height:16px;background:#ece9df;border-radius:99px;overflow:hidden;display:block}
.bar-fill{display:block;height:100%;min-width:2px;background:#4F8F76;border-radius:99px;transition:width .5s}
.bar-num{min-width:46px;text-align:right;font-weight:700;color:#4F8F76;font-size:12.5px}
.score-total{background:#EDF4F0;border:1px solid #CFE2D8;border-radius:10px;padding:12px 14px;margin-top:12px;font-size:13.5px;display:flex;justify-content:space-between;align-items:center}
.score-total b{font-size:17px;color:#4F8F76}
.sev{padding:3px 10px;border-radius:99px;font-size:11.5px;font-weight:700;color:#fff}

.copy-btn{width:100%;padding:14px;border-radius:10px;font-size:14.5px;font-weight:700;cursor:pointer;margin-top:20px;border:none;background:#17453A;color:#fff;font-family:inherit}
.copy-btn:hover{background:#0D2C24}
.copy-btn.done{background:#2e8b78}
.print-btn{width:100%;padding:12px;border-radius:10px;font-size:13.5px;cursor:pointer;margin-top:9px;border:1px solid #dcdacf;background:#fff;color:#5f5e58;font-family:inherit}
.print-btn:hover{background:#f4f2ec}
.foot-note{font-size:11.5px;color:#a09e95;text-align:center;margin-top:18px;line-height:1.6}

.resume-bar{background:#fff8e6;border:1px solid #eddca0;border-radius:11px;padding:12px 15px;margin-bottom:12px;font-size:13px;color:#7a5c12;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.resume-bar button{border:none;border-radius:7px;padding:7px 13px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit}
.resume-yes{background:#215D4C;color:#fff}
.resume-no{background:#efe6c8;color:#7a5c12}

@media(max-width:420px){
  .multi{grid-template-columns:1fr}
  .field-lbl{min-width:80px}
  .sum-lbl{min-width:92px}
}
/* ===== branding ===== */
.brand-logo{display:block;max-width:230px;width:70%;margin:6px auto 16px;height:auto}
.brand-logo-fallback{text-align:center;font-size:20px;font-weight:800;color:#215D4C;margin:8px 0 16px;letter-spacing:-.5px}
.greet-row{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px}
.greet-char{width:72px;height:82px;flex-shrink:0;object-fit:contain;object-position:bottom}
.greet-char.gone{display:none}
.doc-card{display:flex;gap:14px;align-items:center;background:#f2f7f4;border:1px solid #d9e6df;border-radius:12px;padding:14px 16px;margin:4px 0 18px}
.doc-photo{width:62px;height:62px;border-radius:50%;object-fit:cover;object-position:top center;flex-shrink:0;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.12)}
.doc-photo.gone{display:none}
.doc-name{font-size:15px;font-weight:700;color:#1b2a24}
.doc-name b{color:#215D4C}
.doc-title{font-size:12.5px;color:#5f6b64;margin-top:2px}
.doc-slogan{font-size:14.5px;color:#215D4C;font-weight:800;margin-top:6px;letter-spacing:-.3px}
.doc-slogan::before{content:"“";opacity:.5}
.doc-slogan::after{content:"”";opacity:.5}
/* trust links (완료 화면) */
.trust-wrap{margin-top:8px;display:flex;flex-direction:column;gap:9px}
.trust-link{display:flex;align-items:center;gap:12px;padding:13px 15px;border:1px solid #d9e6df;border-radius:11px;background:#fff;text-decoration:none;color:#1b2a24;transition:all .12s}
.trust-link:hover{background:#f2f7f4;border-color:#7FAE9C}
.trust-ico{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;color:#fff}
.ti-news{background:#1a3a5c}.ti-yt{background:#e23b2e}.ti-tv{background:#215D4C}.ti-web{background:#4F8F76}.ti-tel{background:#17453A}
.trust-tx{flex:1;min-width:0}
.trust-t{display:block;font-size:14px;font-weight:600;line-height:1.35}
.trust-s{display:block;font-size:11.5px;color:#5f6b64;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trust-go{color:#9aa39d;font-size:16px;flex-shrink:0}
.doc-sign{display:flex;align-items:center;gap:13px;background:#f2f7f4;border:1px solid #d9e6df;border-radius:12px;padding:14px 16px;margin-top:4px}
.doc-sign img{width:54px;height:54px;border-radius:50%;object-fit:cover;object-position:top center;flex-shrink:0;border:2px solid #fff}
.doc-sign img.gone{display:none}
.doc-sign .s-tx{font-size:13px;line-height:1.55;color:#33413a}
.doc-sign .s-tx b{color:#215D4C}
.sec-head{font-size:12.5px;font-weight:700;color:#215D4C;margin:22px 0 10px;display:flex;align-items:center;gap:7px}

/* ===== new input components (v2) ===== */
/* option icons */
.opt-ico{display:inline-block;width:1.5em;margin-right:4px}
.gender-row{display:flex;gap:12px;margin-top:16px}
.gender-opt{flex:1;text-align:center;border:1.5px solid #cbc9be;border-radius:12px;padding:18px 10px;cursor:pointer;background:#fff;transition:all .12s;font-family:inherit}
.gender-opt:hover{background:#eef5fc;border-color:#7FAE9C}
.gender-opt.sel{background:#E9F1EC;border-color:#215D4C;font-weight:700;color:#163F31}
.gender-emo{font-size:34px;display:block;margin-bottom:6px}
.gender-opt .gl{font-size:15px}
/* select rows (date / count / duration) */
.sel-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:16px}
.sel-row.center{justify-content:center}
.hsel{border:1.5px solid #cbc9be;border-radius:9px;padding:11px 10px;font-size:15px;font-family:inherit;background:#fdfdfc;color:#1a1a1a;min-width:64px}
.hsel:focus{outline:none;border-color:#215D4C}
.sel-unit{font-size:14.5px;color:#4a4a46}
.num-inp{border:1.5px solid #cbc9be;border-radius:9px;padding:11px 12px;font-size:16px;font-family:inherit;background:#fdfdfc;width:74px;text-align:center}
.num-inp:focus{outline:none;border-color:#215D4C}
/* mode toggle (onset) */
.mode-tabs{display:flex;gap:8px;margin-top:16px}
.mode-tab{flex:1;text-align:center;border:1.5px solid #cbc9be;border-radius:9px;padding:10px;font-size:13.5px;cursor:pointer;background:#fff;font-family:inherit;color:#4a4a46}
.mode-tab.sel{background:#215D4C;border-color:#215D4C;color:#fff;font-weight:700}
.mode-body{margin-top:14px}
/* posture / labeled number rows */
.plabel{font-size:14px;color:#33413a;min-width:96px;flex-shrink:0}
/* other free-text under multi */
.other-wrap{margin-top:10px}
.other-inp{width:100%;border:1.5px solid #cbc9be;border-radius:9px;padding:11px 13px;font-size:15px;font-family:inherit;background:#fdfdfc;margin-top:6px}
.other-inp:focus{outline:none;border-color:#215D4C}
.other-inp.hide{display:none}
/* image frame above a question */
.q-img-wrap{margin:14px 0 4px;text-align:center}
.q-img{max-width:100%;border:1px solid #e3e1d7;border-radius:12px;cursor:zoom-in;background:#fbfbf9}
.q-img.gone{display:none}
.q-img-cap{font-size:11.5px;color:#9aa39d;margin-top:4px}
/* enlarge modal (핀치줌) */
.zoom-ov{position:fixed;inset:0;background:rgba(15,25,20,.88);display:flex;align-items:center;justify-content:center;z-index:99;padding:10px;overflow:hidden}
.zoom-stage{max-width:100%;max-height:92vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.zoom-ov img{max-width:96vw;max-height:88vh;border-radius:8px;transform-origin:center center;will-change:transform;user-select:none;-webkit-user-drag:none;cursor:grab}
.zoom-ov .zx{position:absolute;top:12px;right:16px;color:#fff;font-size:32px;cursor:pointer;line-height:1;z-index:2;padding:6px}
.zoom-hint{position:absolute;bottom:14px;left:0;right:0;text-align:center;color:rgba(255,255,255,.75);font-size:12px;pointer-events:none}
/* 동전·손바닥 비교 */
.cp-wrap{display:flex;align-items:center;justify-content:center;gap:18px;margin:16px 0 4px;padding:18px 10px;background:#f7f5ef;border:1px solid #e3e1d7;border-radius:12px}
.cp-item{text-align:center}
.cp-coin{width:64px;height:64px;border-radius:50%;margin:0 auto;background:radial-gradient(circle at 34% 30%,#f4f2ec,#cfcdc2 65%,#a9a79c);border:3px solid #b8b6aa;box-shadow:inset 0 0 0 4px #d9d7cb,0 2px 5px rgba(0,0,0,.15);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#77756a;font-weight:800}
.cp-500{font-size:19px;line-height:1}
.cp-won{font-size:10.5px;margin-top:1px}
.cp-hand{font-size:78px;line-height:1}
.cp-lbl{font-size:12.5px;color:#5f6b64;margin-top:8px;line-height:1.4}
.cp-lbl small{color:#9aa39d}
.cp-lt{font-size:30px;color:#b4b2a9;font-weight:700}
/* 동의 화면 */
.consent-box{background:#f7f9f7;border:1px solid #d9e6df;border-radius:12px;padding:14px 16px;margin:4px 0 16px;font-size:13.5px;line-height:1.65;color:#33413a}
.consent-box p{margin-bottom:10px}
.consent-tbl{width:100%;border-collapse:collapse;margin:6px 0 4px}
.consent-tbl th,.consent-tbl td{border:1px solid #dbe4de;padding:8px 10px;text-align:left;vertical-align:top;font-size:12.8px;line-height:1.55}
.consent-tbl th{background:#eef4f0;color:#215D4C;white-space:nowrap;width:78px;font-weight:700}
.consent-note{font-size:12px;color:#7a786f;margin-top:10px;margin-bottom:0}
.consent-check{display:flex;align-items:flex-start;gap:10px;padding:13px 14px;border:1.5px solid #cbc9be;border-radius:11px;cursor:pointer;font-size:14px;line-height:1.5;user-select:none;background:#fff;transition:all .12s}
.consent-check:hover{border-color:#7FAE9C}
.consent-check.on{background:#E9F1EC;border-color:#215D4C;color:#163F31;font-weight:600}
.cc-box{width:22px;height:22px;border-radius:6px;border:2px solid #b4b2a9;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;margin-top:1px}
.consent-check.on .cc-box{background:#215D4C;border-color:#215D4C}
.btn-primary:disabled{background:#c3c1b8;cursor:default}
/* bodymap 인체도 터치 */
.bm-note{font-size:13px;color:#5f6b64;line-height:1.6;white-space:pre-wrap;margin-top:8px}
.bm-stage{position:relative;display:block;margin:12px 0 0;border:1px solid #e3e1d7;border-radius:12px;overflow:hidden;background:#faf9f6;cursor:crosshair;-webkit-user-select:none;user-select:none;touch-action:manipulation}
.bm-img{width:100%;display:block;-webkit-user-drag:none}
.bm-layer{position:absolute;inset:0;pointer-events:none}
.bm-dot{position:absolute;transform:translate(-50%,-50%);min-width:26px;height:26px;padding:0 6px;border-radius:99px;background:#d1584f;color:#fff;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.4);pointer-events:auto;cursor:pointer}
.bm-tools{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:9px}
.bm-count{font-size:13px;color:#215D4C;font-weight:600}
.bm-clear{background:#f0eee6;border:1px solid #dcdacf;border-radius:8px;padding:7px 13px;font-size:12.5px;cursor:pointer;font-family:inherit;color:#5f5e58;white-space:nowrap}
.bm-clear:hover{background:#e6e4da}
/* summary variant */
.sum-bm{position:relative;display:block;max-width:300px;margin:4px 0 2px;border:1px solid #e3e1d7;border-radius:10px;overflow:hidden}
.sum-bm .bm-img{width:100%;display:block}
.sum-bm-layer{position:absolute;inset:0}
.sum-bm .bm-dot{position:absolute;transform:translate(-50%,-50%);min-width:20px;height:20px;padding:0 4px;border-radius:99px;background:#d1584f;color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;border:1.5px solid #fff}
/* word chips (통증 특성) */
.wchip-wrap{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}
.wchip{border:1.5px solid #cbc9be;border-radius:99px;padding:8px 13px;font-size:13.5px;cursor:pointer;background:#fff;font-family:inherit;color:#1a1a1a;transition:all .12s;line-height:1.2}
.wchip:hover{background:#f2f7f4;border-color:#7FAE9C}
.wchip.sel{background:#215D4C;border-color:#215D4C;color:#fff;font-weight:600}
/* single 2-column */
.opts.cols2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.opts.cols2 .opt{text-align:center}
/* freq rows */
.freq-row{margin-top:10px}
.freq-row .plabel{min-width:72px}
.freq-row .num-inp:disabled{background:#f0eee6;color:#b4b2a9}
/* detail expand (통증 특성 자세히) */
.detail-btn{display:inline-flex;align-items:center;gap:5px;background:#f0eee6;border:1px solid #dcdacf;border-radius:8px;padding:9px 14px;font-size:13px;cursor:pointer;font-family:inherit;color:#33413a;margin-top:14px}
.detail-btn:hover{background:#e6e4da}

/* ---------- 자동 저장/복원 ---------- */
function save(){
  try{ localStorage.setItem(SKEY, JSON.stringify({branch,idx,answers,consent,consentTime,t:Date.now()})); }catch(e){}
}
function clearSave(){ try{ localStorage.removeItem(SKEY); }catch(e){} }
function loadSave(){
  try{
    const raw = localStorage.getItem(SKEY);
    if(!raw) return null;
    const d = JSON.parse(raw);
    if(!d || !d.branch || typeof d.idx!=="number") return null;
    // 완료본은 복원 대상 아님
    if(d.done) return null;
    return d;
  }catch(e){ return null; }
}

/* ---------- 스텝 배열 구성(후속 질문은 실행 중 삽입) ---------- */
function buildSteps(b){
  let flow = BRANCHES[b].flow.map(s => Object.assign({}, s));
  // COMPASS-31 자리표시를 6개 도메인 스텝으로 치환
  const pos = flow.findIndex(x=>x.compass);
  if(pos>-1){
    const domainSteps = COMPASS.map((d,i)=>({
      sec: i===0 ? "COMPASS-31 자율신경" : null,
      ask: `[${d.name}] 아래 항목이 얼마나 자주 있나요?\n0=전혀없음 · 1=가끔 · 2=자주 · 3=항상`,
      type:"scale03", key:d.key, items:d.items,
    }));
    flow.splice(pos, 1, ...domainSteps);
  }
  return BASIC.map(s=>Object.assign({},s)).concat(flow, [Object.assign({},FREETALK)]);
}

function esc(s){ return String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function doResume(){
  const d = loadSave();
  if(!d){ renderIntro(); return; }
  consent = !!d.consent; consentTime = d.consentTime || consentTime;
  branch = d.branch;
  Object.assign(answers, d.answers||{});
  steps = buildSteps(branch);
  idx = Math.min(d.idx, steps.length-1);
  renderStep();
}
function discardResume(){
  clearSave();
  for(const k in answers) delete answers[k];
  branch=null; idx=0; consent=false; consentTime="";
  renderConsent();          // 새로 시작 시 동의 화면부터
}

function pickBranch(b){
  branch = b;
  steps = buildSteps(b);
  idx = 0;
  renderStep();
}

/* ============================================================
   화면 2: 스텝 렌더
   ============================================================ */
function renderStep(){
  save();
  const s = steps[idx];
  draft = {};

  // 헤더 뱃지 + 진행률
  const bd = $("badge");
  bd.textContent = BRANCHES[branch].label + " 문진";
  bd.classList.remove("hide");
  $("progWrap").classList.remove("hide");
  $("progLbl").classList.remove("hide");
  const pct = Math.round((idx/(totalSteps()))*100);
  $("progFill").style.width = pct + "%";
  $("progLbl").textContent = `${idx+1} / ${totalSteps()} 완료`;

  const secHtml = s.sec ? `<div class="sec-t">${esc(s.sec)}</div>` : "";
  let body = "";

  if(s.type==="single")       body = renderSingle(s);
  else if(s.type==="multi")   body = renderMulti(s);
  else if(s.type==="text")    body = renderText(s);
  else if(s.type==="vas")     body = renderVas(s,[[s.lbl||"강도","v"]],true);
  else if(s.type==="vas2")    body = renderVas(s,[[s.lblA,"a"],[s.lblB,"b"]]);
  else if(s.type==="sliders") body = renderSliders(s);
  else if(s.type==="fields")  body = renderFields(s);
  else if(s.type==="scale03") body = renderScale03(s);
  else if(s.type==="date3")   body = renderDate3(s);
  else if(s.type==="onset2")  body = renderOnset2(s);
  else if(s.type==="countfreq")body = renderCountFreq(s);
  else if(s.type==="posture") body = renderPosture(s);
  else if(s.type==="meds")    body = renderMeds(s);
  else if(s.type==="wordchips")body = renderWordchips(s);
  else if(s.type==="freqmulti")body = renderFreqMulti(s);
  else if(s.type==="bodymap") body = renderBodymap(s);
  else if(s.type==="freetalk")body = renderFreetalk(s);

  const imgSrc = (s.imgFn && s.type!=="bodymap") ? s.imgFn() : s.img;
  let imgHtml = imgSrc ? imgBlock(imgSrc, s.imgCap) : "";
  if(s.widget==="coinpalm") imgHtml = coinPalmBlock(s.imgCap);
  const detailHtml = s.detail ? detailBlock(s.detail, s.detailLabel) : "";
  const noteHtml = s.note ? `<div class="q-note">${esc(s.note)}</div>` : "";
  const backBtn = idx>0 ? `<button class="btn-back" onclick="goBack()">← 이전 질문</button>` : "";

  stage.innerHTML = `<div class="card">
      ${secHtml}
      <div class="q-ask">${esc(s.ask)}</div>
      ${noteHtml}
      ${imgHtml}
      ${detailHtml}
      ${body}
    </div>${backBtn}`;

  wireStep(s);
  window.scrollTo(0,0);
}

function imgBlock(src, cap){
  return `<div class="q-img-wrap">

/* 확대 보기 — 두 손가락 확대·축소 + 끌기 + 더블탭 + 휠 지원 */
function zoomImg(src){
  const ov=document.createElement("div");
  ov.className="zoom-ov";
  ov.innerHTML=`<span class="zx">✕</span><div class="zoom-stage"><img src="${esc(src)}" alt="" draggable="false"></div>
    <div class="zoom-hint">두 손가락으로 확대·축소 · 끌어서 이동 · 두 번 탭하면 확대</div>`;
  document.body.appendChild(ov);
  const stage=ov.querySelector(".zoom-stage"), img=ov.querySelector("img");
  let scale=1, tx=0, ty=0;
  const apply=()=>{ img.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`; };
  const clamp=()=>{ scale=Math.min(6,Math.max(1,scale)); if(scale===1){tx=0;ty=0;} };
  // 닫기: X 버튼 또는 배경(이미지 밖) 탭
  ov.querySelector(".zx").onclick=()=>ov.remove();
  ov.addEventListener("click",e=>{ if(e.target===ov||e.target===stage) ov.remove(); });
  // 포인터 기반 팬 + 핀치
  const pts=new Map(); let lastDist=0, lastMid=null, lastTap=0;
  img.style.touchAction="none";
  img.addEventListener("pointerdown",e=>{
    img.setPointerCapture(e.pointerId);
    pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(pts.size===1){
      const now=Date.now();
      if(now-lastTap<300){ // 더블탭: 확대/원위치 토글
        if(scale>1){scale=1;tx=0;ty=0;} else {scale=2.4;}
        clamp(); apply();
      }
      lastTap=now;
    }
    if(pts.size===2){
      const [a,b]=[...pts.values()];
      lastDist=Math.hypot(a.x-b.x,a.y-b.y);
      lastMid={x:(a.x+b.x)/2,y:(a.y+b.y)/2};
    }
    e.preventDefault();
  });
  img.addEventListener("pointermove",e=>{
    if(!pts.has(e.pointerId)) return;
    const prev=pts.get(e.pointerId);
    pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(pts.size===1 && scale>1){ tx+=e.clientX-prev.x; ty+=e.clientY-prev.y; apply(); }
    else if(pts.size===2){
      const [a,b]=[...pts.values()];
      const dist=Math.hypot(a.x-b.x,a.y-b.y);
      const mid={x:(a.x+b.x)/2,y:(a.y+b.y)/2};
      if(lastDist>0){ scale*=dist/lastDist; clamp(); }
      tx+=mid.x-lastMid.x; ty+=mid.y-lastMid.y;
      lastDist=dist; lastMid=mid; apply();
    }
    e.preventDefault();
  });
  const up=e=>{ pts.delete(e.pointerId); if(pts.size<2){lastDist=0;lastMid=null;} };
  img.addEventListener("pointerup",up); img.addEventListener("pointercancel",up);
  // 데스크톱 휠 줌
  ov.addEventListener("wheel",e=>{ e.preventDefault(); scale*= e.deltaY<0?1.15:0.87; clamp(); apply(); },{passive:false});
}

  const src = s.imgFn ? s.imgFn() : s.img;
  const cur = answers[s.key] || {};
  draft.marks = Array.isArray(cur.marks) ? cur.marks.slice() : [];
  return `<div class="bm-note">그림에서 아픈 곳을 손가락으로 눌러 표시해 주세요.
여러 곳 표시할 수 있고, 앞모습·뒷모습 모두 됩니다. 잘못 찍으면 그 점을 다시 누르면 지워져요.</div>
    <div class="bm-stage" id="bmStage">
      <img class="bm-img" id="bmImg" src="${esc(src)}" alt="인체도" draggable="false" onerror="this.style.opacity='.12'">
      <div class="bm-layer" id="bmLayer"></div>
    </div>
    <div class="bm-tools">
      <span class="bm-count" id="bmCount"></span>
      <button type="button" class="bm-clear" onclick="clearMarks()">표시 전부 지우기</button>
    </div>
    <div class="actions"><button class="btn btn-primary" onclick="submitBodymap('${s.key}')">다음</button></div>`;
}
function bmDraw(){
  const layer=$("bmLayer"); if(!layer) return;
  layer.innerHTML = draft.marks.map((m,i)=>`<span class="bm-dot" style="left:${m.x}%;top:${m.y}%" data-i="${i}">${i+1}</span>`).join("");
  layer.querySelectorAll(".bm-dot").forEach(d=>{
    d.onclick=(e)=>{ e.stopPropagation(); draft.marks.splice(Number(d.dataset.i),1); bmDraw(); };
  });
  const c=$("bmCount"); if(c) c.textContent = draft.marks.length? `${draft.marks.length}곳 표시됨` : "그림을 눌러 표시하세요";
}
function clearMarks(){ draft.marks=[]; bmDraw(); }
function submitBodymap(key){
  answers[key] = draft.marks.length ? {marks:draft.marks.slice()} : "";
  next();
}

/* ---------- multi (아이콘 · "기타" 자유입력 지원) ---------- */
function renderMulti(s){
  const cur = Array.isArray(answers[s.key]) ? answers[s.key].slice() : [];
  // "기타: xxx" 형태가 저장돼 있으면 분리
  let otherText = "";
  const stdCur = cur.filter(v=>{ if(/^기타/.test(v)){ otherText = v.replace(/^기타[:：]?\s*/,""); return false;} return true; });
  draft.multi = stdCur;
  draft.otherText = otherText;
  const one = s.ch.length<=4 ? " one" : "";
  const items = s.ch.map((c,i)=>{
    const on = stdCur.includes(c);
    const ic = s.chIcons&&s.chIcons[i] ? `<span class="opt-ico" style="margin-right:2px">${s.chIcons[i]}</span>`:"";
    return `<div class="chk${on?' sel':''}" data-v="${esc(c)}"><span class="box">${on?'✓':''}</span><span>${ic}${esc(c)}</span></div>`;
  }).join("");
  const otherOn = otherText!=="";
  const otherHtml = s.other ? `
    <div class="chk${otherOn?' sel':''}" id="otherChk"><span class="box">${otherOn?'✓':''}</span><span>기타 (직접 입력)</span></div>` : "";
  const otherInp = s.other ? `<input class="other-inp${otherOn?'':' hide'}" id="otherInp" placeholder="예: ${esc(s.otherPh||'해당 내용을 적어 주세요')}" value="${esc(otherText)}">` : "";
  return `<div class="multi${one}" id="multi">${items}${otherHtml}</div>
    ${otherInp}
    <div class="actions">
      ${s.optional?`<button class="btn btn-ghost" onclick="skipStep()">${esc(s.skipLabel||"해당 없음 / 건너뛰기")}</button>`:""}
      <button class="btn btn-primary" id="nextBtn" onclick="submitMulti()">다음</button>
    </div>`;
}

/* ---------- date3 (연/월/일 선택) ---------- */
function yearOpts(from, to, sel){
  let o = `<option value="">연도</option>`;
  for(let y=to;y>=from;y--) o+=`<option value="${y}"${sel==y?" selected":""}>${y}년</option>`;
  return o;
}
function numOpts(from, to, sel, unit, ph){
  let o = `<option value="">${ph}</option>`;
  for(let n=from;n<=to;n++) o+=`<option value="${n}"${sel==n?" selected":""}>${n}${unit}</option>`;
  return o;
}
function renderDate3(s){
  const cur = answers[s.key] || {};
  const thisY = 2026;
  return `<div class="sel-row" id="date3">
      <select class="hsel" data-k="y">${yearOpts(1920, thisY, cur.y)}</select>
      <select class="hsel" data-k="m">${numOpts(1,12,cur.m,"월","월")}</select>
      <select class="hsel" data-k="d">${numOpts(1,31,cur.d,"일","일")}</select>
    </div>

/* '해당 없음'류(배타 선택) 옵션 — 정확히 일치할 때만.
   "전신적으로 힘이 없음"·"하체 힘없음" 같은 증상 문구는 제외됨 */
const NONE_OPTIONS = new Set([
  "없음","없어요","받은 적 없음","가진 자료 없음","특별한 패턴 없음","수면에 문제 없음",
]);
function isNoneOption(v){ return NONE_OPTIONS.has(v); }

/* ============================================================
   상호작용 배선
   ============================================================ */
function wireStep(s){
  if(s.type==="single"){
    $("opts").querySelectorAll(".opt,.gender-opt").forEach(b=>{
      b.onclick = ()=>{ answers[s.key]=b.dataset.v; advance(s, b.dataset.v); };
    });
  }
  if(s.type==="multi"){
    $("multi").querySelectorAll(".chk").forEach(el=>{
      if(el.id==="otherChk"){
        el.onclick = ()=>{
          const inp = $("otherInp"); const on = !el.classList.contains("sel");
          el.classList.toggle("sel", on); el.querySelector(".box").textContent = on?"✓":"";
          if(inp){ inp.classList.toggle("hide", !on); if(on) inp.focus(); else inp.value=""; }
        };
        return;
      }
      el.onclick = ()=>{
        const v = el.dataset.v;
        const noneLike = isNoneOption(v);
        let arr = draft.multi;
        if(el.classList.contains("sel")){
          arr = arr.filter(x=>x!==v); el.classList.remove("sel"); el.querySelector(".box").textContent="";
        }else{
          if(noneLike){ // '없음'류 선택 시 나머지 해제
            arr = [v];
            $("multi").querySelectorAll(".chk").forEach(o=>{ if(o.id!=="otherChk"){o.classList.remove("sel");o.querySelector(".box").textContent="";} });
          }else{
            arr = arr.filter(x=>!isNoneOption(x));
            $("multi").querySelectorAll(".chk").forEach(o=>{ if(o.id!=="otherChk" && isNoneOption(o.dataset.v)){o.classList.remove("sel");o.querySelector(".box").textContent="";} });
            arr.push(v);
          }
          el.classList.add("sel"); el.querySelector(".box").textContent="✓";
        }
        draft.multi = arr;
      };
    });
  }
  if(s.type==="meds"){
    $("medType").querySelectorAll(".chk").forEach(el=>{
      el.onclick = ()=>{ const on=!el.classList.contains("sel"); el.classList.toggle("sel",on); el.querySelector(".box").textContent=on?"✓":""; };
    });
  }
  if(s.type==="bodymap"){
    const st=$("bmStage");
    st.onclick=(e)=>{
      if(e.target.classList.contains("bm-dot")) return; // 점 클릭은 삭제(별도 처리)
      const img=$("bmImg"); const r=img.getBoundingClientRect();
      const x=((e.clientX-r.left)/r.width)*100, y=((e.clientY-r.top)/r.height)*100;
      if(x<0||x>100||y<0||y>100) return;
      draft.marks.push({x:+x.toFixed(1), y:+y.toFixed(1)});
      bmDraw();
    };
    bmDraw();
  }
  if(s.type==="wordchips"){
    $("wchips").querySelectorAll(".wchip").forEach(b=>{
      b.onclick = ()=>{
        const w=b.dataset.w, on=!b.classList.contains("sel");
        b.classList.toggle("sel",on);
        if(on) draft.words.push(w); else draft.words = draft.words.filter(x=>x!==w);
      };
    });
  }
  if(s.type==="freqmulti"){
    const al = $("fqAlways");
    al.onclick = ()=>{
      const on=!al.classList.contains("sel");
      al.classList.toggle("sel",on); al.querySelector(".box").textContent=on?"✓":"";
      $("freqm").querySelectorAll(".fq-in").forEach(i=>{ i.disabled=on; if(on) i.value=""; });
    };
  }
  if(s.type==="onset2"){
    $("onsetTabs").querySelectorAll(".mode-tab").forEach(t=>{
      t.onclick = ()=>{
        $("onsetTabs").querySelectorAll(".mode-tab").forEach(x=>x.classList.remove("sel"));
        t.classList.add("sel");
        const ex = t.dataset.m==="exact";
        $("onsetExact").style.display = ex?"":"none";
        $("onsetApprox").style.display = ex?"none":"";
      };
    });
  }
  if(s.type==="scale03"){
    $("scale").querySelectorAll(".sg-opt").forEach(b=>{
      b.onclick = ()=>{
        const i=Number(b.dataset.i), n=Number(b.dataset.n);
        b.parentNode.querySelectorAll(".sg-opt").forEach(o=>o.classList.remove("sel"));
        b.classList.add("sel");
        draft.scale[i]=n;
      };
    });
  }
  const t = $("txt");
  if(t && (s.type==="text")){
    t.focus();
    t.onkeydown = e=>{ if(e.key==="Enter" && (e.metaKey||e.ctrlKey)){ e.preventDefault(); submitText(); } };
  }
}

/* single: 후속 질문 있으면 삽입 */
function advance(s, val){
  handleFollowup(s, val);
  next();
}
function handleFollowup(s, val){
  if(s.fu){
    const trigger = (val||"").indexOf(s.fuIf)===0 || (val||"").indexOf(s.fuIf)>-1;
    // 후속 삽입 여부: 다음 스텝이 이미 후속인지 확인 후 재구성
    const already = steps[idx+1] && steps[idx+1].__fuOf===s.key;
    if(trigger && !already){
      const f = Object.assign({}, s.fu, {__fuOf:s.key});
      steps.splice(idx+1, 0, f);
    }else if(!trigger && already){
      steps.splice(idx+1, 1);
      if(answers[s.fu.key]!=null) delete answers[s.fu.key];
    }
  }
}

function submitMulti(){
  const s = steps[idx];
  let arr = draft.multi.slice();
  if(s.other){
    const chk = $("otherChk"), inp = $("otherInp");
    if(chk && chk.classList.contains("sel") && inp && inp.value.trim()){
      arr = arr.filter(x=>!/^없/.test(x));
      arr.push("기타: " + inp.value.trim());
    }
  }
  answers[s.key] = arr;
  next();
}
function submitDate3(key){
  const o={}; $("date3").querySelectorAll("select").forEach(s=>{ if(s.value) o[s.dataset.k]=Number(s.value); });
  answers[key]=o; next();
}
function submitOnset(key){
  const exactTab = $("onsetExact").style.display!=="none";
  if(exactTab){
    const o={mode:"exact"}; ["oy","om","od"].forEach((id,i)=>{ const v=$(id).value; if(v)o[["y","m","d"][i]]=Number(v); });
    answers[key]=o;
  }else{
    const n=$("onN").value.trim();
    answers[key]={mode:"approx", n:n?Number(n):null, unit:$("onUnit").value};
  }
  next();
}
function submitCountFreq(key){
  const wrap=$("cf");
  const period=wrap.querySelector('[data-k=period]').value;
  const n=wrap.querySelector('[data-k=n]').value.trim();
  answers[key]={period, n:n?Number(n):null};
  next();
}
function submitPosture(key){
  const o={}; $("posture").querySelectorAll("input").forEach(i=>{ const v=i.value.trim(); if(v)o[i.dataset.k]=v; });
  answers[key]=o; next();
}
function submitMeds(key){
  const types=[]; $("medType").querySelectorAll(".chk.sel").forEach(c=>types.push(c.dataset.v));
  const o={ name:$("medName").value.trim(), years:$("medY").value.trim(), months:$("medM").value.trim(), types };
  if(!o.name && !o.years && !o.months && !types.length){ answers[key]=""; }
  else answers[key]=o;
  next();
}
function submitWordchips(key){
  const free = ($("wcFree").value||"").trim();
  const words = draft.words.slice();
  answers[key] = (free || words.length) ? {free, words} : "";
  next();
}
function submitFreqMulti(key){
  const o={};
  if($("fqAlways").classList.contains("sel")) o.always=true;
  else $("freqm").querySelectorAll(".fq-in").forEach(i=>{ const v=i.value.trim(); if(v) o[i.dataset.k]=Number(v); });
  answers[key]=o; next();
}
function submitText(){
  const s = steps[idx];
  const v = ($("txt").value||"").trim();
  if(!v && !s.optional){ flashRequired(); return; }
  answers[s.key] = v;
  next();
}
function submitFreetalk(){
  const s = steps[idx];
  answers[s.key] = ($("txt").value||"").trim();
  finish();
}
function submitVas(key){
  const s = steps[idx];
  const obj = {};
  stage.querySelectorAll('input[type=range]').forEach(r=>{ obj[r.dataset.k]=Number(r.value); });
  answers[key] = obj;
  next();
}
function submitFields(key){
  const obj = {};
  $("fields").querySelectorAll(".field-inp").forEach(i=>{ const v=i.value.trim(); if(v) obj[i.dataset.k]=v; });
  answers[key] = obj;
  next();
}
function submitScale(key, n){
  const obj = draft.scale || {};
  answers[key] = obj;
  next();
}
function skipStep(){
  const s = steps[idx];
  if(s.type==="multi") answers[s.key]=[];
  else if(s.type==="fields") answers[s.key]={};
  else answers[s.key]="";
  next();
}

function vasIn(r){ $("vn-"+r.dataset.k).textContent = r.value; }

function flashRequired(){
  const t = $("txt");
  if(t){ t.style.borderColor="#d1584f"; t.focus(); setTimeout(()=>{t.style.borderColor="";},1200); }
}

/* ---------- 진행 ---------- */
function next(){
  save();
  idx++;
  if(idx>=steps.length){ finish(); return; }
  renderStep();
}
function goBack(){
  if(idx<=0) return;
  // 후속 질문 스킵 처리를 위해 단순 감소
  idx--;
  renderStep();
}

/* ---------- 완료 시 병원 서버(구글시트)로 전송 ----------
   SHEET_URL 이 비어 있으면 조용히 건너뜀. 어떤 오류가 나도
   환자가 보는 화면(요약·복사·인쇄)은 절대 막지 않는다. */
function submitToServer(){
  try{
    if(!SHEET_URL) return;
    const payload = {
      consent, consentTime,
      submittedAt: new Date().toISOString(),
      branch, branchLabel: (BRANCHES[branch]&&BRANCHES[branch].label)||"",
      name: answers.name||"",
      answers,                    // 전체 원본 답변(구조화)
      summary: plainSummary(),    // 사람이 읽는 요약 텍스트
    };
    fetch(SHEET_URL, {
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"}, // Apps Script preflight 회피
      body: JSON.stringify(payload),
    }).catch(function(){});        // 네트워크 실패는 조용히 무시
  }catch(e){ /* 전송 실패가 환자 경험을 막지 않도록 무시 */ }
}

/* 값 → 표시 문자열 */
function fmtYMD(v){ return [v.y?v.y+"년":"", v.m?v.m+"월":"", v.d?v.d+"일":""].filter(Boolean).join(" "); }
function fmtOnset(v){
  if(v.mode==="exact") return fmtYMD(v);
  return (v.n!=null && v.unit)? `${v.n}${v.unit}` : (v.n!=null? String(v.n):"");
}
function fmtPosture(v){
  const p=[];
  if(v.sit) p.push(`앉기 ${v.sit}시간`);
  if(v.stand) p.push(`서기 ${v.stand}시간`);
  if(v.drive) p.push(`운전 ${v.drive}시간`);
  if(v.other) p.push(v.other);
  return p.join(" · ");
}
function fmtMeds(v){
  const p=[];
  if(v.name) p.push(v.name);
  const dur=[v.years?v.years+"년":"", v.months?v.months+"개월":""].filter(Boolean).join(" ");
  if(dur) p.push("복용 "+dur);
  if(v.types&&v.types.length) p.push(v.types.join("·"));
  return p.join(" · ");
}
function fmtWords(v){
  const p=[];
  if(v.words&&v.words.length) p.push(v.words.join(", "));
  if(v.free) p.push("("+v.free+")");
  return p.join(" ");
}
function fmtFreq(v){
  if(v.always) return "항상 통증이 있다";
  return [["day","하루"],["week","한 주"],["month","한 달"],["year","일 년"]]
    .filter(([k])=>v[k]!=null).map(([k,l])=>`${l}에 ${v[k]}번`).join(" · ");
}
function fmt(v){
  if(v==null) return "";
  if(Array.isArray(v)) return v.length? v.join(", ") : "";
  if(typeof v==="object"){
    if("marks" in v) return v.marks.length? `인체도에 ${v.marks.length}곳 표시함`:"";  // bodymap
    if("words" in v) return fmtWords(v);                   // wordchips (통증 특성)
    if("always" in v || "day" in v || "week" in v || "month" in v || "year" in v) return fmtFreq(v); // freqmulti
    if(v.mode) return fmtOnset(v);                         // onset2
    if("period" in v) return (v.period&&v.n!=null)?`${v.period}에 ${v.n}번`:"";  // countfreq(구)
    if("years" in v || "months" in v || "types" in v || typeof v.name==="string") return fmtMeds(v); // meds
    if("sit" in v || "stand" in v || "drive" in v || "other" in v) return fmtPosture(v);  // posture
    if("y" in v || "m" in v || "d" in v) return fmtYMD(v); // date3
    return "";
  }
  return String(v);
}

function buildSummary(){
  const a = answers;
  const now = new Date();
  const dateStr = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일`;
  const bcls = branch;
  let h = `<span class="sum-badge ${bcls}">${BRANCHES[branch].label}</span>
    <div class="sum-date">작성일 · ${dateStr}</div>`;

  // 기본정보
  h += secBlock("기본 정보", [
    row("성함", a.name), row("생년월일", a.birth), row("성별", a.gender),
    a.phone?row("연락처", a.phone):"",
  ]);

  if(branch==="pain") h += summaryPain(a);
  else if(branch==="auto") h += summaryAuto(a);
  else h += summaryCancer(a);

  // 자유발언
  if(fmt(a.free_talk)) h += `<div class="sum-sec">자유 발언</div><div class="sum-val free">${esc(a.free_talk)}</div>`;

  return h;
}

function row(lbl, val){
  const v = fmt(val);
  if(!v) return "";
  return `<div class="sum-row"><span class="sum-lbl">${esc(lbl)}</span><span class="sum-val">${esc(v)}</span></div>`;
}
function rowKey(k){ return row(LABELS[k]||k, answers[k]); }
function secBlock(title, rows){
  const r = rows.filter(Boolean).join("");
  if(!r) return "";
  return `<div class="sum-sec">${esc(title)}</div>${r}`;
}
function vasText(obj, rows){
  if(!obj) return "";
  return rows.map(([n,k])=>obj[k]!=null?`${n} ${obj[k]}/10`:"").filter(Boolean).join(" · ");
}

/* 요약에 표시할 인체도(표시점 포함) */
function bodymapRow(a){
  const pa=a.pain_area;
  if(!pa || !pa.marks || !pa.marks.length) return "";
  const src = a.gender==="여성" ? IMG.bodyF : IMG.bodyM;
  const dots = pa.marks.map((m,i)=>`<span class="bm-dot" style="left:${m.x}%;top:${m.y}%">${i+1}</span>`).join("");
  return `<div class="sum-row"><span class="sum-lbl">아픈 부위</span>
    <span class="sum-val"><span class="sum-bm"><img class="bm-img" src="${esc(src)}" alt="" onerror="this.closest('.sum-bm').style.display='none'"><span class="sum-bm-layer">${dots}</span></span></span></div>`;
}

/* ----- 통증 요약 ----- */
function summaryPain(a){
  let h = secBlock("주요 증상", [
    bodymapRow(a), rowKey("pain_side"),
    row("통증 강도", vasText(a.vas,[["가장 심할 때","a"],["평상시","b"]])),
    rowKey("onset"), rowKey("worse"), a.worse_situation?rowKey("worse_situation"):"",
    rowKey("trauma"), rowKey("night"), rowKey("radiation"),
  ]);
  h += secBlock("통증 특성", [
    rowKey("quality"), rowKey("rest_pain"),
    rowKey("aggravate"), rowKey("relieve"), rowKey("area"), rowKey("depth"),
    rowKey("freq"), rowKey("duration"),
  ]);
  h += commonTailSummary(a, true);
  return h;
}

/* ----- 공통 꼬리 요약(과거력·생활 / 치료선호 / 회복목표) ----- */
function commonTailSummary(a, withPastTx){
  let h = secBlock("과거력 · 생활", [
    withPastTx?rowKey("past_tx"):"",
    rowKey("comorbid"), rowKey("meds"),
    rowKey("surgery"), a.surgery_detail?rowKey("surgery_detail"):"",
    rowKey("family"), rowKey("allergy"), rowKey("exercise"), rowKey("posture"),
    rowKey("prev_dx"), rowKey("records"),
  ]);
  h += secBlock("치료 선호", [ rowKey("tx_avoid"), rowKey("tx_prefer"), rowKey("test_avoid") ]);
  h += secBlock("회복 목표", [ rowKey("goal"), rowKey("wish") ]);
  return h;
}

/* ----- 자율신경 요약 (COMPASS 막대 + BFI) ----- */
function summaryAuto(a){
  let h = secBlock("전신 증상", [
    rowKey("sx_body"), rowKey("sx_neuro"), rowKey("sx_cardio"), rowKey("sx_gi"),
  ]);

  // COMPASS-31 막대
  const maxByDomain = {}; COMPASS.forEach(d=> maxByDomain[d.key]=d.items.length*3);
  let total=0, totalMax=0, hasCompass=false;
  const bars = COMPASS.map(d=>{
    const obj = a[d.key]||{};
    let sum=0; for(const k in obj) sum+=Number(obj[k])||0;
    const mx = maxByDomain[d.key];
    total+=sum; totalMax+=mx;
    if(Object.keys(obj).length) hasCompass=true;
    const pct = mx? Math.round(sum/mx*100):0;
    return `<div class="bar-row"><span class="bar-name">${esc(d.name)}</span>
      <span class="bar-track"><span class="bar-fill" style="width:${pct}%"></span></span>
      <span class="bar-num">${sum}/${mx}</span></div>`;
  }).join("");
  if(hasCompass){
    const ratio = totalMax? total/totalMax : 0;
    let sev="경미", sc="#2e8b78";
    if(ratio>=0.66){sev="중증";sc="#d1584f";}
    else if(ratio>=0.33){sev="중등도";sc="#d99a2b";}
    h += `<div class="sum-sec">COMPASS-31 자율신경 점수</div>${bars}
      <div class="score-total"><span>전체 합계 <b>${total}</b> / ${totalMax}점</span>
      <span class="sev" style="background:${sc}">${sev}</span></div>`;
  }

  // BFI
  const lvl = vasText(a.bfi_level,[["현재","now"],["24h 평균","avg"],["24h 최악","worst"]]);
  const intf = vasText(a.bfi_interf,[["일반활동","general"],["기분","mood"],["일","work"],["대인관계","relation"],["보행","walk"],["삶의 즐거움","enjoy"]]);
  if(lvl||intf){
    h += `<div class="sum-sec">피로도 (BFI)</div>`;
    if(lvl) h += row("피로 강도", lvl);
    if(intf) h += row("피로로 인한 지장", intf);
  }

  // 생활·수면
  const daily = a.daily||{};
  const dailyStr = [["식사","meal","회"],["수면","sleep","시간"],["대변","stool","회"],["소변","urine","회"]]
    .map(([n,k,u])=>daily[k]?`${n} ${daily[k]}${u}`:"").filter(Boolean).join(" · ");
  h += secBlock("생활 · 수면", [
    dailyStr?row("하루 기록", dailyStr):"",
    rowKey("sleep"),
    a.stress&&a.stress.v!=null?row("스트레스", a.stress.v+"/10"):"",
    rowKey("trigger"), rowKey("exam"),
  ]);
  h += commonTailSummary(a, false);
  return h;
}

/* ----- 암재활 요약 ----- */
function summaryCancer(a){
  let h = secBlock("암 정보", [
    rowKey("cancer_type"), answers.cancer_type_other?rowKey("cancer_type_other"):"", rowKey("stage"), rowKey("tx_status"), rowKey("last_tx"),
  ]);
  const lvl = vasText(a.bfi_level,[["현재","now"],["24h 평균","avg"],["24h 최악","worst"]]);
  h += secBlock("현재 상태", [
    rowKey("symptoms"),
    lvl?row("피로도", lvl):"",
    a.pain_vas&&a.pain_vas.v!=null?row("통증 강도", a.pain_vas.v+"/10"):"",
    rowKey("ecog"),
  ]);
  h += secBlock("치료 이력 · 기대", [
    rowKey("prev_hosp"), a.prev_hosp_other?rowKey("prev_hosp_other"):"", rowKey("expect"), rowKey("guardian"),
  ]);
  h += commonTailSummary(a, false);
  return h;
}

/* ---------- 요약 복사(텍스트) ---------- */
function copySummary(){
  const text = plainSummary();
  const btn = $("copyBtn");
  const done = ()=>{ btn.textContent="✓ 복사되었습니다"; btn.classList.add("done"); setTimeout(()=>{btn.textContent="📋 요약 복사 (예약·EMR 붙여넣기용)";btn.classList.remove("done");},2000); };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text,done));
  }else fallbackCopy(text,done);
}
function fallbackCopy(text, cb){
  const ta=document.createElement("textarea");
  ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{ document.execCommand("copy"); cb(); }catch(e){ alert("복사에 실패했습니다. 화면 내용을 직접 선택해 복사해 주세요."); }
  document.body.removeChild(ta);
}

function plainSummary(){
  const a = answers;
  const now=new Date();
  const L=[];
  L.push(`■ 행복한H병원 사전문진 [${BRANCHES[branch].label}]`);
  L.push(`작성일 ${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`);
  L.push("");
  const line=(l,v)=>{ const s=fmt(v); if(s) L.push(`- ${l}: ${s}`); };
  const lineK=k=>line(LABELS[k]||k, a[k]);

  L.push("[기본정보]");
  line("성함",a.name); line("생년월일",a.birth); line("성별",a.gender); if(a.phone)line("연락처",a.phone);
  L.push("");

  if(branch==="pain"){
    L.push("[주요 증상]");
    lineK("pain_area"); lineK("pain_side");
    line("통증 강도", vasText(a.vas,[["가장 심할 때","a"],["평상시","b"]]));
    lineK("onset"); lineK("worse"); if(a.worse_situation)lineK("worse_situation");
    lineK("trauma"); lineK("night"); lineK("radiation");
    L.push(""); L.push("[통증 특성]");
    ["quality","rest_pain","aggravate","relieve","area","depth","freq","duration"].forEach(lineK);
    commonTailPlain(L, lineK, true);
  }else if(branch==="auto"){
    L.push("[전신 증상]");
    ["sx_body","sx_neuro","sx_cardio","sx_gi"].forEach(lineK);
    L.push(""); L.push("[COMPASS-31]");
    let total=0,totalMax=0;
    COMPASS.forEach(d=>{ const o=a[d.key]||{}; let s=0; for(const k in o)s+=Number(o[k])||0; const mx=d.items.length*3; total+=s; totalMax+=mx; if(Object.keys(o).length)L.push(`- ${d.name}: ${s}/${mx}`); });
    if(totalMax) L.push(`- 전체 합계: ${total}/${totalMax}`);
    L.push(""); L.push("[피로도 BFI]");
    line("피로 강도", vasText(a.bfi_level,[["현재","now"],["24h평균","avg"],["24h최악","worst"]]));
    line("지장", vasText(a.bfi_interf,[["일반활동","general"],["기분","mood"],["일","work"],["대인관계","relation"],["보행","walk"],["삶의즐거움","enjoy"]]));
    L.push(""); L.push("[생활·수면]");
    const d=a.daily||{}; const ds=[["식사","meal","회"],["수면","sleep","시간"],["대변","stool","회"],["소변","urine","회"]].map(([n,k,u])=>d[k]?`${n} ${d[k]}${u}`:"").filter(Boolean).join(" · ");
    if(ds)line("하루 기록",ds); lineK("sleep"); if(a.stress&&a.stress.v!=null)line("스트레스",a.stress.v+"/10"); lineK("trigger"); lineK("exam");
    commonTailPlain(L, lineK, false);
  }else{
    L.push("[암 정보]");
    ["cancer_type","cancer_type_other","stage","tx_status","last_tx"].forEach(lineK);
    L.push(""); L.push("[현재 상태]");
    lineK("symptoms");
    line("피로도", vasText(a.bfi_level,[["현재","now"],["24h평균","avg"],["24h최악","worst"]]));
    if(a.pain_vas&&a.pain_vas.v!=null)line("통증 강도",a.pain_vas.v+"/10"); lineK("ecog");
    L.push(""); L.push("[치료 이력·기대]");
    ["prev_hosp","prev_hosp_other","expect","guardian"].forEach(lineK);
    commonTailPlain(L, lineK, false);
  }
  if(fmt(a.free_talk)){ L.push(""); L.push("[자유 발언]"); L.push(a.free_talk); }
  return L.join("\n");
}
function commonTailPlain(L, lineK, withPastTx){
  L.push(""); L.push("[과거력·생활]");
  (withPastTx?["past_tx"]:[]).concat(["comorbid","meds","surgery","surgery_detail","family","allergy","exercise","posture","prev_dx","records"]).forEach(lineK);
  L.push(""); L.push("[치료 선호]");
  ["tx_avoid","tx_prefer","test_avoid"].forEach(lineK);
  L.push(""); L.push("[회복 목표]");
  ["goal","wish"].forEach(lineK);
}

/* ---------- 부팅 ---------- */
boot();
</script>
